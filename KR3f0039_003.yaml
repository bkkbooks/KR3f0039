body:
  text: 甲得一鹿四分鹿之二乙得一鹿四分鹿之一丙得一鹿丁得四分鹿之三戊得四分鹿之二術曰列置甲六乙五丙四丁三戊二各自為差副併為法以鹿數乘未併者各自為實實如法得一草曰置六五四三二并之得二十為法又以甲六乘五鹿得三十復以二十除之得一鹿餘一與法俱倍之得四分鹿之二以乙五乘五鹿得二十五復以二十除得一鹿四分之一又以丙四乘五鹿得二十為一鹿又以丁三乘五鹿得一十五鹿乃得四分鹿之三又以戊二乘五鹿得一十乃得四分鹿之二合前問二今有鹿直西走馬獵追之未及三十六步鹿回直北走馬俱斜逐之走五十步未及一十步斜直射之得鹿若鹿不回馬獵追之問幾何里而及之答曰三里術曰置斜逐步數以射步數增之自相乘以追之未及步數自相乘減之餘以開方除之所得以減斜逐步數餘為法以斜逐步數乘未及步數為實實如法得一草曰置斜逐步五十增未及步數十步共六十步自乘得三千六百又置追之未及步數三十六步自相乘得一千二百九十六以減斜自乘步餘二千三百四步以開方除之得四十八步以減斜逐步數五十餘二為法又置未及三十六以斜逐步數五十乘之得一千八百以法除之得九百步乃合前問三今有垣髙一丈三尺五寸材長二丈二尺五寸倚之於垣末與垣齊問引材却行幾何材末至地答曰四尺五寸術曰垣髙自乘以減材長自乘餘以開方除之所得以減材餘即卻行尺數草曰置垣髙數自相乘得一百八十二尺二寸五分又以材長數自相乘得五百六尺二寸五分以垣髙自乘減之餘三百二十四以開方法除之得一丈八尺以減材長二丈二尺五寸餘四尺五寸合前問四今有倉東西袤一丈二尺南北廣七尺南壁髙九尺北壁髙八尺問受粟幾何答曰得四百四十斛二十七分斛之二十術曰併南北壁髙而半之以廣袤乘之為實實如斛法而一得斛數草曰置南北壁髙併之得一十七半之得八尺五寸又置長一十二尺以廣七尺因之得八十四尺又以髙八尺五寸乘之得七百一十四尺以斛法一尺六寸二分除之得四百四十斛餘一百二十并法各以六除之得二十七分之二十合前問五今有圓圌上周一丈八尺下周二丈七尺高一丈四尺問受幾何答曰三百六十九斛四㪷九分㪷之四術曰上下周相乘又各自乘併以高乘之以三十六而一所得為實實如斛法而一得斛數草曰置上周一丈八尺自相乘得三百二十四尺以下周二丈七尺自相乘得七百二十九尺又上下周相乘得四百八十六尺併三位得一千五百三十九又以高一丈四尺乘之得二萬一千五百四十六尺以三十六除之得五百九十八尺五寸為實以斛法除之得三百六十九斛四㪷餘與法各折半皆以九除之法得九餘得四即合前問六今有窖上廣四尺下廣七尺上袤五尺下袤八尺深一丈問受粟幾何答曰得二百二十五斛三㪷八十一分㪷之七術曰倍上袤下袤從之亦倍下袤上袤從之各以其廣乘之併以深乘之六而一所得為實實如斛法而一得斛數草曰置上長五尺倍之得十尺加下長八尺為十八尺倍下長八尺得十六尺加上長五尺為二十一尺以上廣四尺乘上長一十八尺得七十二尺又以下廣七乘下長二十一尺得一百四十七尺併之得二百一十九尺又以深十尺乘之得二千一百九十以六除之得三百六十五尺以斛法除之得二百二十五斛三㪷法餘各半之得八十一分㪷之七即合前問七今有窖上方五尺下方八尺深九尺問受粟幾何答曰二百三十八斛九分斛之八術曰上下方相乘又各自相乘併以深乘之三而一所得為實實如斛法而一得斛數草曰置上方五尺自相乘得二十五尺置下方八尺自相乘得六十四尺又以上下方相乘得四十尺併三位得一百二十九又以深九尺乘之得一千一百六十一又以三而一得三百八十七尺以斛法除得二百三十八斛餘與法皆半之九約得九分斛之八合前問八今有倉東西袤一丈四尺南北廣八尺南壁高一丈受粟六百二十二斛九分斛之二問北壁高幾何答曰八尺術曰置粟積尺以倉廣袤相乘而一所得倍之減南壁高尺數餘為北壁高草曰置六百二十二斛以九因之內子二得五千六百又以斛法一尺六寸二分乘之得九千七十二尺是粟積數卻以九除之得一千八尺以長廣相乘得一百一十二尺以除一千八尺得九尺倍之得一十八尺減南壁高一丈餘即北壁高數合前問九今有圓圌上周一丈五尺高一丈二尺受粟一百六十八斛五㪷二十七分㪷之五問下周幾何答曰一丈八尺術曰置粟積尺以三十六乘之以高而一所得以上周自相乘減之餘以上周尺數從而開方除之所得即下周草曰置粟一百六十八斛五㪷以分母二十七乘之內子五得四千五百五十又以斛法乘之得七千三百七十一又以三十六乘得二十六萬五千三百五十六又以二十七除之得九千八百二十八又以高一丈二尺除之得八百一十九又以上周自乘得二百二十五以減上數餘五百九十四又以上周一丈五尺為從法開方合前問一今有窖上方八尺下方一丈二尺受粟九百三十八斛八十一分斛之二十二問深幾何答曰一丈五尺術曰置粟積尺以三乘之為實上下方相乘又各自乘併以為法實如法而一草曰置粟九百三十八斛以分母八十一乘之內子二十二得七萬六千以斛法乘之得一十二萬三千一百二十又以三因之得三十六萬九千三百六十以八十一除之得四千五百六十為實又以上方自相乘得六十四以下方自相乘得一百四十四以上下方相乘得九十六三位併之得三百四為法除實得一丈五尺合前問一一今有窖上廣五尺上袤八尺下廣七尺深九尺受粟三百一斛八㪷八十一分㪷之四十二問下袤幾何答曰一丈術曰置粟積尺以六乘之深而一所得倍上袤以上廣乘之又以下廣乘上袤併以減之餘以倍下廣上廣從之而一得下袤草曰置三百一斛八㪷以分母八十一乘之內子四十二得二萬四千四百五十又以斛法乘之得三萬九千六百九又以六乘之得二十三萬七千六百五十四以分母八十一除之得二千九百三十四又以深九尺除之得三百二十六為實又以倍上袤得一十六以上廣五尺乘之得八十又以下廣乘上袤得五十六併之得一百三十六以減實餘一百九十又倍下廣七尺得一十四又加上廣五尺共一十九除實得一丈合前問一二今有上錦三匹中錦二匹下錦一匹直絹四十五匹上錦二匹中錦三匹下錦一匹直絹四十三匹上錦一匹中錦二匹下錦三匹直絹三十五匹問上中下錦各直絹幾何答曰上錦一匹直絹九匹中錦一匹直絹七匹下錦一匹直絹四匹術曰如方程臣淳風等謹按此術宜云以右行上錦遍乘中行而以直除之又乘其左亦以直除以中行中錦不盡者遍乘左行又以直除左行下錦不盡者上為法下為實實如法得下錦直絹求中錦直絹者以下錦直絹乘中行下錦而減下實餘如中錦而一即得中錦直絹求上錦直絹者亦以中下錦直絹各乘右行錦數而減下實餘如上錦而一即得上錦之數列而别之價直匹數雜而難分價直匹數者一行之下實今以右行上錦遍乘中行者欲為同齊而去中行上錦同齊者謂同行首齊諸下而以直減中行術從簡易雖不為同齊以同齊之意觀之其宜然矣又轉去上錦中錦則其求者下錦一位及實存焉故以上為法下為實實如法得下錦一匹直絹其中行兩錦實今下錦一匹直數先見乘中行下錦匹數得一位别實減此别實於下實則其餘專中錦一位價直匹數故以中錦數而一其右行三錦實今中下錦直匹數並見故亦如前右行求别實以減中下實餘如上錦數而一即得草曰置上錦三匹於右上中錦二匹於右中下錦一匹於右下直絹四十五匹於下又置上錦二匹於中上中錦三匹於中中下錦一匹於中下直絹四十三匹於下又置上錦一匹於左上中錦二匹於左中下錦三匹於左下直絹三十五匹於下然以右上錦三匹偏乘中行上得六中得九下得三直絹一百二十九又以右上錦三遍乘左行得上三中六下九直絹一百五乃以右上中下並直絹再減中行一減左行餘有中行中五下一絹三十九左行中四下八直絹六十又以中行中五遍乘左行中得二十下得四十直絹三百以中行四度遍減左行餘只有下錦三十六直絹一百四十四以下錦為法除絹一百四十四得四匹是下錦一匹之直求中錦以下錦絹乘中行下錦一匹得四以減下絹三十九餘三十五以中錦五匹除之得七匹是中錦之直求上錦以中錦價乘右行中錦得一十四以下錦直乘下錦得四共一十八以減下直四十五餘二十七以上錦三除之得九匹合前問一三今有孟仲季兄弟三人各持絹不知匹數大兄謂二弟曰我得汝等絹各半得滿七十九匹中弟曰我得兄弟絹各半得滿六十八匹小弟曰我得二兄絹各半得滿五十七匹問兄弟本持絹各幾何答曰孟五十六匹仲三十四匹季一十二匹術曰大兄二中弟一小弟一合一百五十八匹大兄一中弟二小弟一合一百三十六匹大兄一中弟一小弟二合一百一十四匹如方程而求即得草曰置大兄二於右上中弟一於右中小弟一於右下絹一百五十八匹於下又置大兄一於中上中弟二於中中小弟一於中下絹一百三十六匹於下又置大兄一於左上中弟一於左中小弟二於左下絹一百一十四匹於下以方程錦法求之以右行上二遍因左行孟得二仲得二季得四合得二百二十八以右行直減之仲餘一季餘三合餘七十又以右行上二遍因中行孟得二仲得四季得二合得二百七十二以右行直減之仲得三季得一合餘一百一十四又以中行仲三遍因左行仲得三季得九合得二百一十以中行直減之季餘得八合餘得九十六為實以季餘八為法除之得季一十二匹又中行合一百一十四減一十二餘一百二以仲三除之得仲三十四匹又右行合一百五十八減季一十二匹仲三十四匹外餘一百一十二以孟二除之得孟五十六匹合前問一四今有甲乙丙三人持錢不知多少甲言我得乙太半得丙少半可滿一百乙言我得甲太半得丙半可滿一百丙言我得甲乙各太半可滿一百問甲乙丙持錢各幾何答曰甲六十乙四十五丙三十術曰三甲二乙一丙錢三百四甲六乙三丙錢六百二甲二乙三丙錢三百如方程即得草曰置三甲於右上二乙於右中一丙於右下錢三百於下又置四甲於中上六乙於中中三丙於中下錢六百於下又置二甲於左上二乙於左中三丙於左下錢三百於下以右行上三遍因左行甲得六乙得六丙得九錢得九百以右行再減之餘乙二丙七錢三百又以右行上三遍因中行得甲一十二乙一十八丙九錢一貫八百以右行四遍減之餘乙一十丙五錢六百左行進一位得乙二十丙七十錢三貫以中行再減之餘得丙六十錢一貫八百以六十除之得丙三十又中行錢六百減一百五十餘四百五十以乙一十除之得乙四十五又去右行錢減一百二十餘一百八十以甲三除之得甲六十合前問一五今有甲乙懷錢各不知其數甲得乙十錢多乙餘錢五倍乙得甲十錢適等問甲乙懷錢各幾何答曰甲三十八錢乙十八錢術曰以四乘十錢又以七乘之五而一所得半之以十錢增之得甲錢數以十錢減之得乙錢數草曰置多錢五倍除十錢餘四因之得四十又以七乘之得二百八十却以五除之得五十六半之得二十八加得乙十錢共三十八錢為甲懷錢又以二十八錢減十錢為乙懷錢合問一六今有車五乘行道三十里雇錢一百四十五今有車二十六乘雇錢三千九百五十四四十五分錢之十四問行道幾何答曰一百五十七里少半里術曰置今有雇錢數以行道里數乘之以本車乘數乘之為實以本雇錢數乘今有車數為法實如法得一草曰置今雇錢三千九百五十四四十五分錢之十四通分內子得一十七萬七千九百四十四又以三十里乘之得五百三十三萬八千三百二十又以本車五乘之得二千六百六十九萬一千六百為實又以本雇錢一百四十五乘今有車二十六得三千七百七十又分母四十五乘之得一十六萬九千六百五十為法除實得一百五十七里餘五萬六千五百五十與法各約之得三分里之一合問一七今有惡粟一斛五㪷舂之得糲米七㪷今有惡粟二㪷問為稗米幾何答曰八㪷四升術曰置糲米之數求為稗米所得之數以乘今有惡粟為實以本粟為法實如法得一臣淳風等謹按此術置糲米七斗以稗米率九乘之以十而一得六斗十分斗之三是為惡粟十五斗得作稗米六斗十分斗之三此今有術惡粟二十斗為所有數稗米六斗十分斗之三為所求率惡粟十五斗為所有率草曰置糲米七斗以九因得六十三又以一十除得六斗一十分斗之三卻通分內子得六百三十又以二斛因得一萬二千六百為實又置一斛五斗以十分因之得一十五斛為法除之得八斗四升合問一八今有好粟五斗舂之得糳米二斗五升今有御米十斗問為好粟幾何答曰二斛二斗八升七分升之四術曰置糳米數求御米之數為法臣淳風等謹按問意宜云置糳米數求御米之數為法其術直云置糳米數為法者錯也又置今御米數以本粟乘之為實實如法得一臣淳風等謹按此術置糳米二十五升以御米率七乘之以糳米率八而一得二斗十六分斗之三為好粟五斗得作御米二斗十六分斗之三於今有術御米十斗為所有數好粟五斗為所求率御米二斗十六分斗之三為所有率草曰置糳米二斗五升以御米率七因之得一百七十五八而一得二斗十六分之三又却通分內子得三十五為法又置一十斗以十六乘之得一百六十為實以法除之得二斛二斗八升七分之四合問一九今有差丁夫五百人合共重車一百一十三乘問各共重幾何答曰六十五乘乘各四人共重四十八乘乘各五人共重術曰置人數為實車數為法而一得四人共重又置一於上方命之實餘返減法訖以四加上方一得五人共重法餘即四人共重車數實餘即五人共重車數草曰置五百人以一百一十三乘除之得四人餘四十八以減法餘六十五為四人共一車以四因六十五人得二百六十減五百餘二百四十以四十八除之得五人共重一車量合問二今有甲持錢二十乙持錢五十丙持錢四十丁持錢三十戊持錢六十凡五人合本治生得利二萬五千六百三十五欲以本錢多少分之問各人得幾何答曰甲得二千五百六十三錢四分錢之二乙得六千四百八錢四分錢之三丙得五千一百二十七錢丁得三千八百四十五錢四分錢之一戊得七千六百九十錢四分錢之二術曰各列置本持錢數副併為法以利錢乘未併者各自為實實如法得一草曰置甲等五人所持錢併之得二百為法又以甲持錢二十乘利錢二萬五千六百三十五得五十一萬二千七百以法除之得二千五百六十三餘與法皆五除得法四餘二是四分錢之二求乙錢以乙五十乘利錢得一百二十八萬一千七百五十又以法除之得六千四百八錢餘與法皆倍之得四分錢之三求丙錢以四十乘利錢得一百二萬五千四百以法除之得五千一百二十七錢求丁錢以三十乘利錢得七十六萬九千五十以法除之得三千八百四十五錢四分錢之一求戊錢以六十乘利錢得一百五十三萬八千一百以法除之得七千六百九十錢四分錢之二乃合前問二一今有甲乙丙三人共出一千八百錢買車一量欲與親知乘之為親不取還賣得錢一千五百各以本錢多少分之甲得五百八十三錢三分錢之一乙得五百錢丙得四百一十六錢三分錢之二問本出錢各幾何答曰甲出錢七百乙出錢六百丙出錢五百術曰置甲乙丙分得之數副併為法以置車錢數乘未併者各自為實實如法得一草曰置甲得錢五百八十三以分母三乘之內子一得一千七百五十又以本置車錢一千八百乘之得三百一十五萬又置求分錢一千五百以分母三因之得四千五百為法以除實得七百是甲錢求乙置分得錢數五百以一千八百乘之得九十萬以一千五百為法除之得六百求丙置分得錢數四百一十六以錢分母三因之內子二得一千二百五十又以一千八百乘之得二百二十五萬又置未分錢一千五百三因之得四千五百為法除實得五百合前問二二今有雀一隻重一兩九銖燕一隻重一兩五銖有雀燕二十五隻併重二斤一十三銖問燕雀各幾何答曰雀十四隻燕十一隻術曰置假令雀一十五隻燕十隻盈四銖於右行又置假令雀十二隻燕十三隻不足八銖於左行以盈不足維乘之併以為實併盈不足為法實如法得一草曰置雀一十五隻於右上置盈四銖於右下又置雀一十二隻於左上置不足八銖於左下維乘之以右下四乘左上一十二得四十八以左下八乘右上一十五得一百二十併之得一百六十八以盈不足併之得一十二為法除實得一十四雀求燕置燕十於右上四於右下又置燕十三於左上置八於左下以左下八乘右上十得八十以右下四乘左上十三得五十二併之得一百三十二併盈不足為法除實得一十一燕得合前問二三今有七人九日造成弓十二張半今有十七人造弓十五張問幾何日訖答曰四日八十五分日之三十八術曰置今造弓數以弓日數乘之又以成弓人數乘之為實以今有人數乘本有弓數為法實如法得一草曰置今造弓十五張以成弓日數九乘之得一百三十五又以成弓人數七乘之得九百四十五為實又置本造弓十二張半以今造弓十七人乘之得二百一十二半為法除之得四日法與餘皆退位四因得八十五分之三十八合前問二四今有城周二十里欲三尺安鹿角一枚五重安之問凡用鹿角幾何答曰六萬一百枚城若圓凡用鹿角六萬六十枚術曰置城周里尺數三而一所得五之又置五以三乘之又自相乘以三自乘而一所得四之併上位即得凡數城若圓者置城周里尺數三而一所得五之又併一二三四凡得一十以六乘之並之得凡數草曰置二十里以三百步乘之得六千步法六因之得三萬六千以三尺除之得一萬二千以重數五乘之得六萬於上位又以五乘三得一十五又自相乘得二百二十五又以三自乘得九為法以除二百二十五得二十五四因之得一百若求圓者置城圍尺數三而一得一萬二千所得五因之為六萬於上位又以一二三四併之得一十以六因之得六十從上位得六萬六十是圓也二五今有粟二百五十斛委注平地下周五大四尺問高幾何答曰五尺術曰置粟積尺以三十六乘之為實以下周自乘為法實如法得一草曰置粟二百五十以斛法一尺六寸二分乘又以三十六乘之得一萬四千五百八十置下周五丈四尺自相乘得二千九百一十六為法除實得五尺合前問二六今有客歲作臣淳風等謹按問意三百五十四日要與粟一百五十斛已與之粟先五十八日歸問折粟與粟各幾何答曰折粟二十四斛五㪷五十九分㪷之四十五與粟一百二十五斛四㪷五十九分㪷之十四術曰置歸作日數以與粟乘之各自為實以一歲三百五十四日為法實如法得一草曰置歸日五十八日以粟一百五十斛乘之得八千七百又以歲三百五十四除得二十四石五㪷餘與法皆六除之得五十九分㪷之四十五求與粟數置作日二百九十六以一百五十斛乘之得四萬四千四百以歲三百五十四除之得一百二十五斛四斗五十九分㪷之十四合前問二七今有廩人人日食米六升今三十五日食米七千四百九十二斛八㪷問人幾何答曰三千五百六十八人術曰置米數為實以六升乘三十五日為法實如法得一草曰置米七千四百九十二斛八㪷以六乘三十五日得二斛一㪷為法以除積數得三千五百六十八人合前問二八今有五十八人二十九日食麵九十五斛三㪷一升少半升問人食幾何答曰五升太半升術曰置麵斛斗升數為實以人日食相乘為法實如法得一草曰置麵數以三因之內子一得二萬八千五百九十四置人數五十八以二十九乘之得一千六百八十二又以三因之得五千四十六為法除得五升餘皆三約之得三分之二為太半升合前問二九今有二人三日錮銅得一斤九兩五銖今一月日錮銅得九千八百七十六斤五兩四銖少半銖問人功幾何答曰一千二百五十三人三百六十三分人之二百六十二術曰置二人三日所得錮銅斤兩銖通之作銖以二人三日相乘除之為一人一日之銖二十四而一還以一人一日所得兩銖通分內子復以一月三十日乘一人積分所得復以銖分母三通之為法又以今錮銅斤兩通為銖以少半銖者三分之一以三通分內子一以六乘之為實實如法而一得人數不盡約之為分草曰置二人三日所得銅一斤九兩以十六通斤得二十五兩又以銖數二十四乘之內五銖得六百五以二人乘三日得六為法除得一百銖六分之五是一日所得之數以二十四除之一人所得四兩四銖六分銖之五卻通分內子得六百五以一月三十日乘之得一萬八千一百五十又以通分母三因之得五萬四千四百五十為法置今錮銅以十六兩乘之內五兩得一十五萬八千二十一兩又以二十四銖乘之內四銖得三百七十九萬二千五百八銖又以通分母三因之內子一得一千一百三十七萬七千五百二十五又以法分母六因之得六千八百二十六萬五千一百五十為實以法除之得一千二百五十三人法與餘皆一百五十約之法得三百六十三餘得二百六十二合前問三今有立方九十五尺欲為立圓問徑幾何答曰一百一十六尺四萬三百六十九分尺之一萬一千九百六十八術曰立方再自乘又以十六乘之九而一所得開立方除之得丸徑草曰置九十六再自乘得八十八萬四千七百三十六又以十六乘之得一千四百一十五萬五千七百七十六以九除之得一百五十七萬二千八百六十四以立方法除借一算子於下常超二位步至百而止商置一百置一百萬於下法之上名曰方法以方法命上商一百除實一百萬方法三因之得三百萬又置一百萬於方法之下名曰廉法三因之方法一退廉法再退下法三退又置一十於上商一百之下又置一千於下法之上名曰隅法以方廉隅三法皆命上商一十除實畢又倍廉法三因隅法皆從方法又置一百一十於方法之下三因之名曰廉法方法一退廉法再退隅法三退又置六於上商之下又置六於下法之上名曰隅法乃自乘得三十六又以六乘廉法得一千九百八十以方廉隅三法皆命上商六除之除實畢倍廉法三因隅法皆從方法得一百一十六尺四萬三百六十九分尺之一萬一千九百六十八合前問三一今有立圓徑一百三十二尺問為立方幾何答曰一百八尺三萬四千九百九十三分尺之三萬四千二十術曰令徑再自乘九之十六而一開立方除之得立方草曰置徑一百三十二尺再自乘得二百二十九萬九千九百六十八又以九因之得二千六十九萬九千七百一十二又以十六除之得一百二十九萬三千七百三十二以開立方法除之得合前問三二今有立方材三尺鋸為方枕一百二十五枚問一枚為立方幾何答曰一枚方六寸術曰以材方寸數再自乘以枚數而一所得開立方除之得枕方草曰以三十寸再自相乘得二萬七千寸以枕一百二十五枚除之得二百一十六以開立方除之置上商六於上借一算子於下置六於下法之上以自乘得三十六名曰方法以方法命上商除之得方寸乃合前問三三今有亭一區五十人七日築訖今有三十人問幾何日築訖答曰十一日三分日之二術曰以本人數乘築訖日數為實以今有人數為法實如法得一草曰置七以五十人乘之得三百五十以三十人為法除得十一日三分之二合問三四今有負他錢轉利償之初去轉利得二倍還錢一百第二轉利得三倍還錢二百第三轉利得四倍還錢三百第四轉利得五倍還錢四百還畢皆轉利倍數皆通本錢今除初本有錢五千九百五十問初本幾何答曰本錢一百五十術曰置初利還錢以三乘之併第二還錢又以四乘之併第三還錢又以五乘之併第四還錢訖併餘錢為實以四轉得利倍數相乘得一百二十減一餘為法實如法得一草曰置初還錢一百以三乘之得三百又併第二還錢得五百以四乘之得二千又併第三還錢得二千三百以五乘之得一萬一千五百又併第四還錢并今有錢五千九百五十共得一萬七千八百五十以四轉利二三四五相乘得一百二十除一餘一百一十九為法除實得一百五十本合前問三五今有三人四日客作得麥五斛今有七人一月日客作問得麥幾何答曰八十七斛五㪷術曰以七人乘一月三十日又以五斛乘之為實以三人乘四日為法實如法而得一草曰以七人乘三十日得二百一十又五斛乘之得一千五十為實以三人乘四日得一十二為法除實得八十七斛五㪷即合前問三六今有人舉取他絹重作劵要過限一日息絹一尺二日息二尺如是息絹日多一尺今過限一百日問息絹幾何答曰一百二十六匹一丈術曰併一百日一日息以乘百日而半之即得草曰置一百一尺以一百日乘之得一萬一百尺半之得五千五十尺以匹法四十尺除之得一百二十六匹一丈合前問三七今有婦人於河上蕩杯津吏問曰杯何以多婦人答曰家中有客不知其數但二人共醬三人共羮四人共飯凡用杯六十五問人幾何答曰六十人術曰列置共杯人數於右方又置共杯數於左方以人數互乘杯數併以為法令人數相乘以乘杯數為實實如法得一草曰置人數二三四列於右行置一一一杯數左行以右中三乘左上一得三又以右下四乘之得一十二又以右上二乘左中一得二又以右下四乘之得八以右上二乘左下一得二又以右中三乘左下二得六三位併之得二十六為法又以二三四相乘得二十四以乘六十五杯得一千五百六十以二十六除之得六十人數合前問三八今有雞翁一直錢五雞母一直錢三雞雛三直錢一凡百錢買雞百隻問雞翁母雛各幾何答曰雞翁四直錢二十雞母十八直錢五十四雞雛七十八直錢二十六又答雞翁八直錢四十雞母十一直錢三十三雞雛八十一直錢二十七又答雞翁十二直錢六十雞母四直錢十二雞雛八十四直錢二十八術曰雞翁每增四雞母每減七雞雛每益三即得所以然者其多少互相通融於同價則無術可窮盡其理此問若依上術推算難以通曉然較之諸本並同疑其從來脫漏闕文蓋流傳既久無可考證自漢唐以來雖甄鸞李淳風注釋未見詳辨今將算學教授謝察微擬立術草創新添入其術曰置錢一百在地以九為法除之以九除之既雛三直錢一則是每雛直三分錢之一宜以雞翁母各三因併之得九得雞母之數不盡者返減下法為雞翁之數别列雞都數一百隻在地減去雞翁母數餘即雞雛得合前問若雞翁每增四雞母每減七雞雛每益三或雞翁每減四雞母每增七雞雛每損三即各得又答之數草曰置錢一百文在地為實又置雞翁一雞母一各以雞雛三因之雞翁得三雞母得三并雞雛三併之共得九為法除實得一十一為雞母數不盡一返減下法九餘八為雞翁數别列雞都數一百隻在地減去雞翁八雞母一十一餘八十一為雞雛數置翁八以五因之得四十即雞翁直錢又置雞母一十一以三因之得三十三即雞母直又置雞雛八十一以三除之得二十七即雞雛直合前問又草曰置雞翁八增四得一十二雞母一十一減七得四雞雛八十一益三得八十四得百雞之數如前求之得百錢之數亦合前問又草曰置雞翁八減四得四雞母一十一增七得一十八雞雛八十一損三得七十八如前求之各得百雞百錢之數亦合前問
