body:
  text: 張邱建算經卷上周甄鸞注經唐李淳風注釋劉孝孫撰細草以九乗二十一五分之三問得幾何答曰一百九十四五分之二草曰置二十一以分母五乗之内子三得一百八然以九乗之得九百七十二却以分母五而一得合所問以二十一七分之三乗三十七九分之五問得㡬何答曰八百四二十一分之十六草曰置二十一以分母七乗之内子三得一百五十又置三十七以分母九乗之内子五得三百三十八二位相乗得五萬七百為實以二分母七九相乗得六十三而一得八百四餘六十三分之四十八各以三約之得二十一分之一十六合前問以三十七三分之二乗四十九五分之三七分之四問得㡬何答曰一千八百八十九一百五分之八十三草曰置三十七以分母三乗之内子二得一百一十三又置四十九於下别置五分於下右之三在左又於五分之下别置七分三分之下置四維乗之以右上五乗下左四得二十以右下七乗左上三得二十一併之得四十一以分母相乗得三十五以三十五除四十一得一餘六以一加上四十九得五十又以分母三十五乗之内子六得一千七百五十六以乗上位一百一十三得一十九萬八千四百二十八為實又以分母三母相乗得一百五為法除實得一千八百八十九餘一百五分之八十三合所問臣淳風等謹按以前三條雖有設問而無成術可慿宜云分母乗全内子令相乗為實分母相乗為法若兩有分母各乗其全内子令相乗為實分母為法實如法而得一以十二除二百五十六九分之八問得㡬何答曰二十一二十七分之十一草曰置二百五十六以分母九乗之内子八得二千三百一十二為實又置除數十二以九乗之得一百八為法除實得二十一法與餘俱半之得二十七分之十一合所問以二十七五分之三除一千七百六十八七分之四問得㡬何答曰六十四四百八十三分之三十八草曰置一千七百六十八以分母七乗之内子四得一萬二千三百八十又以除分母五乗之得六萬一千九百為實又置除數二十七以分母五乗之内子三得一百三十八又以分母七乗之得九百六十六為法除之得六十四法與餘各折半得四百八十三分之三十八得合所問以五十八二分之一除六千五百八十七三分之二四分之三問得㡬何答曰一百一十二七百二分之四百三十七草曰置六千五百八十七於上又别置三分於下右之二於左又置四分於三下之三於左維乗之分母得十二子得一十七以分母除子得一餘五加一上位得六千五百八十八以分母十二乗之内子五得七萬九千六十一又以除數分母二因之得一十五萬八千一百二十二又置除數五十八於下以二因之内子一得一百一十七又以乗數分母十二乗之得一千四百四為法以除實得一百一十二法與餘俱半之得七百二分之四百三十七臣淳風等謹按此術以前三條亦有問而無術宜云置所有之數通分内子為實置所除之數以三分乗之為法實如法得一若法實俱有分及重有分者同而通之今有官獵得鹿賜圍兵初圍三人中賜鹿五頭次圍五人中賜鹿七頭次圍七人中賜鹿九頭併三圍賜鹿一十五萬二千三百三十三頭少半頭問圍兵㡬何答曰三萬五千人術曰以三賜人數互乗三賜鹿數併以為法三賜人數相乗併賜鹿數為實實如法而得一草曰置三人於右上五鹿於左上五人於右中七鹿於左中七人於右下九鹿於左下以右中乗左上五得二十五又以右下七乗左上二十五得一百七十五又以右上三乗左中七得二十一又以右下七乗左中二十一得一百四十七又以右上三乗左下九得二十七又以右中五乗左下二十七得一百三十五将左三位併之得四百五十七為法以右三位相乗得一百五别置一十五萬二千三百三十三頭少半頭位於上先以三乗之内子一得四十五萬七千以一百五乗之得四千七百九十八萬五千置除法四百五十七以三因之得一千三百七十一為法除之得三萬五千人合問今有獵圍周四百五十二里一百八十步布圍兵十步一人今欲縮令通身得地四尺問圍内縮㡬何答曰三十里五十二步術曰置圍里步數一退以四因之為尺以步法除之即得縮數草曰置四百五十二里以里法三百步乗之内子一百八十得一十三萬五千七百八十步退一等得一萬三千五百七十八尺四因之得五萬四千三百一十二尺以六尺除之為步得九千五十二步以里法三百除之得三十里五十二步合問今有圍兵二萬三千四百人以布圍周各相去五步今圍内縮除一十九里一百五十步而止問兵相去㡬何答曰四步四分步之三術曰置人數以五乗之又以十九里一百五十步減之餘以人數除之不盡平約之草曰置圍兵二萬三千四百人以五乗之得一十一萬七千步置一十九里以三百通之内子一百五十步得五千八百五十步以減上位得一十一萬一千一百五十步以圍兵二萬三千四百除之得四步餘以圍兵數再折除餘得三除法得四今有封山周棧三百二十五里甲乙丙三人同遶周棧行甲日行一百五十里乙日行一百二十里丙日行九十里問周行㡬何日㑹答曰十日六分日之五術曰置甲乙丙行里數求等數為法以周棧里數為實實如法而得一草曰置甲乙丙行里數甲行一百五十乙行一百二十丙行九十各求等數得三十為法除周棧數得十日法餘二十五各以五除之法得六餘得五各以三十約之甲乙丙行數乃甲得五周乙得四周丙得三周合前問今有内營周七百二十步中營周九百六十步外營周一千二百步甲乙丙三人值夜甲行内營乙行中營丙行外營俱發南門甲行九乙行七丙行五問各行㡬何周俱到南門答曰甲行十二周乙行七周丙行四周術曰以内中外周步數互乗甲乙丙行率求等數約之各得行周草曰置内營七百二十步於左上中營九百六十步於中外營一千二百步於下又各以二百四十約之内營得三中營得四外營得五别置甲行九於右上乙行七於右中丙行五於右下以求整數以右位再倍上得三十六中得二十八下得二十以左上三除右上三十六得十二周以左中四除右中二十八得七周以左下五除右下二十得四周是甲乙丙行數合前問案此下今有津今有葮今有木今有城四問俱各有形式髙下進退俯仰線法視法毫不可紊非依問繪圖無以闡其立意之妙將轉疑其字句舛訛謹凖測量法義為補四圖各冠原問之右庶圖問㕘觀不至失其本義云今有津不知其廣東岸髙一丈坐岸東去岸五十步遥望岸上及津西畔適與人目㕘合人目去地二尺四寸問津廣㡬何答曰二百八步三分步之一術曰以岸髙乗人去岸為實以人目去地為法實如法而一草曰置岸髙一丈又别置五十步於上以六乗之得三百尺又以十尺乗之得三千尺為實以人眼去地二尺四寸為法除三千尺得一千二百五十尺又以六尺為步除之得二百八步法六餘二各折半得三分之一合前問今有葮生於池中出水三尺去岸一丈引葮趨岸不及一尺問葮長及水深各㡬何答曰葮長一丈五尺水深一丈二尺術曰置葮去岸尺數以不及尺數減之餘自相乗以出水尺數而一所得加出水而半之得葮長減出水尺數即得水深草曰置去岸一丈減不及一尺餘有九尺自乗之得八十一尺以出水三尺除之得二丈七尺加出水三尺共得三丈半之得葮長一丈五尺減出水三尺餘水深一丈二尺合問今有木不知逺近髙下立一表髙七尺人去表九步立望表頭適與木端邪平人目去地七尺二寸又去表三十步薄地遥望表頭亦與木端邪平問木去表及髙㡬何答曰去表三百一十五步木髙八丈五寸術曰以表髙乗人立去表為實以表髙減人目去地為法而一得木去表以表髙乗木去表為實以人目薄地去表為法實如法而一所得加表髙即木髙草曰置表髙七尺以去表九步乗之得六十三為實以表髙七尺減人目去地七尺二寸餘有二寸為法除實得去表三百一十五步又以表髙七尺乗去表三百一十五步得二千二百五以去表三十步除之得七丈三尺五寸如入表髙七尺得木髙八丈五寸合問今有城不知大小去人逺近於城西北隅而立四表相去各六丈令左兩表與城西北隅南北望參相直從右後表望城西北隅入右前表一尺二寸又望西南隅亦入右前表四寸又望東北隅亦入左後表二丈四尺問城去左後表及大小各㡬何答曰城去左後表一里二百步東西四里四十步南北三里一百步術曰置表相去自乗以望城西北隅入數而一得城去表又以望城西南隅入數而一所得減城去表餘為城之南北以望城東北隅入左後表數減城去表餘以乗表相去又以入左後表數而一即得城之東西草曰置表相去六丈自乗之得三千六百尺以西北隅入表一尺二寸除之得三千尺以六尺除之得五百步又以里法三百步除之得一里餘二百步為城去表步數又别置三千六百尺以望城西南隅入表四寸除之得九千尺以減城去表三千尺餘有六千尺以六除之得一千步里法而一得三里餘有一百步為城南北步數又置望城東北隅入左後表二丈四尺以減城去表三千尺餘有二千九百七十六尺以表相去六丈乗之得一十七萬八千五百六十尺以入左後表二丈四尺除之得七千四百四十尺以六尺除之得一千二百四十步里法而一得四里餘四十步為城東西步合問今有甲日行疾於乙日行二十五里而甲發洛陽七日至鄴乙發鄴九日至洛陽問鄴洛陽相去㡬何答曰七百八十七里半術曰以甲乙所至日數相乗又以甲日行疾里數乗之為實以甲至日減乙至日數餘為法實如法而一草曰置甲乙所至七日九日相乗得六十三又以甲疾行二十五里乗之得一千五百七十五為實以甲至七日減乙至九日餘有二日為法除實得七百八十七里半合問今有官出庫金五十九斤一兩賜王九人公十二人侯十五人子十八人男二十一人王得金各多公五兩公得金各多侯四兩侯得金各多子三兩子得金各多男二兩問王公侯子男各得金㡬何答曰王一斤六兩公一斤一兩侯十三兩子十兩男八兩術曰置王公侯子男數王位十四之公位九之侯位五之子位二之併之以減出金兩數餘以凡人數而一所得各以本差之數加之得王公侯子男各所得金之數不加即男之得金草曰置王九人公十二人侯十五人子十八人以王位十四之得一百二十六公位九之得一百八侯位五之得七十五子位二之併之得三百四十五以減出金五十九斤一兩餘六百為實倂五等人數得七十五為法除實得八兩乃加十四兩為王加九得十七兩為公加五得十三兩為侯加二得十兩為子男不加如數加滿斤法而一不滿者命為兩合問今有十等人大官甲等十人官賜金依等次差降之上三人先入得金四斤持出下四人後入得金三斤持出中央三人未到者亦依等次更給問各得金㡬何及未到三人復應得金㡬何答曰甲一斤七十八分斤之三十三乙一斤七十八分斤之二十六丙一斤七十八分斤之十九丁一斤七十八分斤之十二戊一斤七十八分斤之五己七十八分斤之七十六庚七十八分斤之六十九辛七十八分斤之六十二壬七十八分斤之五十五癸七十八分斤之四十八未到三人共得三斤七十八分斤之十五術曰以先入人數分所持金數為上率以後入人數分所持金數為下率二率相減餘為差實併先後入人數而半之以減凡人數餘為差法實如法而一得差數倂一二三以差數乗之以減後入人所持金數餘以後入人數而一又置十人減一餘乗差數併之即第一人所得金數以次每減差數各得之矣并中央未到三人得應持金數草曰先置入人數於左上置得金數於右上又置後入人數於左下置後得金數於右下以後入人數乗先得金數得十六以先入人數乗後得金數得九以九直減十六得七為差實又併先後入人數七半之得三半以減十人數餘六半又以先後人數率分母三與分母四相乗得十二以乗六半得七十八為差法七十八是一斤也置後入所得金數三以乗差法得二百三十四又置一二三得差以七因之得四十二直減二百三十四餘有一百九十二以後入四人數除之人得四十八乃是癸得之數累加差七乃合前問今有圓材徑頭二尺一寸欲以為方問各㡬何答曰一尺五寸淳風等謹按開方除之為一尺四寸二十五分寸之二十一術曰置徑尺寸數以五乗之為實以七為法實如法而一草曰置二尺一寸以五乗之得一百五寸以七除之得一尺五寸合前問今有泥方一尺欲為彈丸令徑一寸問得㡬何答曰一千七百七十七枚九分枚之七術曰置泥方寸數再自乗以十六乗之為實以九為法實如法得一草曰置一尺為十寸再自乗得一千以十六乗之得一萬六千為實以九為法除實得一千七百七十七枚九分之七合前問臣淳風等謹按密率為丸一千九百九枚十一分枚之一依密率術曰令泥方寸再自乗以二十一乗之為實以十一為法實如法而一即得又依密率草曰置泥方十寸再自乗得一千寸以二十一乗之得二十一萬為實以十一為法除之得一千九百九枚十一分枚之一合問今有客不知其數兩人共盤少兩盤三人共盤長三盤問客及盤㡬何答曰客三十人十三盤術曰以二乗少盤三乗長盤倂之為盤數倍之又以二乗少盤數增之得人數草曰置二人於右上少兩盤於右下置三人於左上置剰三盤於左下各以人乗盤右下得四左下得九併之得一十三盤數别置少盤二以剰盤三乗之得六更併少剰盤乗之得三十人合前問今有女善織日益功疾初日織五尺今一月日織九疋三丈問日益㡬何答曰五寸二十九分寸之十五術曰置今織尺數以一月日而一所得倍之又倍初日尺數減之餘為實以一月日數初一日減之餘為法實如法得一草曰置九疋以疋法乗之内三丈得三百九十尺以一月三十日除之毎日得一丈三尺倍之得二丈六尺又倍初日尺數得一丈減之餘一丈六尺為實又置一月三十日減一日得二十九日為法除之得五寸二十九分寸之十五合前問今有女子不善織日減功遲初日織五尺末日織一尺今三十日織訖問織㡬何答曰二疋一丈術曰併初末日織尺數半之餘以乗織訖日數即得草曰置初日五尺訖日一尺併之得六半之得三以三十日乗之得九十尺合前問今有絹一疋買紫草三十斤染絹二丈五尺今有絹七疋欲減買紫草還自染餘絹問減絹買紫草各㡬何答曰減絹四疋一丈二尺十三分尺之四買草一百二十九斤三兩一十三分兩之九術曰置今有絹疋數以本絹一疋尺數乗之為減絹實以紫草三十斤乗之為買紫草實以本絹尺數併染尺為法實如法得一其一術盈不足術為之亦得草曰置絹七疋以疋法乗之得二百八十尺又以買草絹一疋四十尺乗之得一萬一千二百尺為減絹實以本絹尺數六十五尺為法除實得一百七十二尺法與餘皆倍之得一十三分尺之四又置二百八十尺以紫草三十斤乗之得八千四百斤為買草實亦以六十五尺為法除之得一百二十九斤餘不盡者十六乗之得二百四十又以法除之得三兩餘與法皆倍之得一十三分兩之九合前問今有生絲一斤練之折五兩練絲一斤染之出三兩今有生絲五十六斤八兩七分兩之四問染得㡬何答曰四十六斤二兩四百四十八分兩之二百二十三術曰置一斤兩數以折兩數減之餘乗今有絲斤兩之數又以出兩數併一斤兩數乗之為實一斤兩數自乗為法實如法得一兩數草曰置五十六斤以兩法十六乗之内子八兩得九百四兩又以分母七乗之内子四得六千三百三十二兩為實又以練率十一染率十九相乗得二百九以乗其實得一百三十二萬三千三百八十八為積以十六相乗得二百五十六又以分母七乗之得一千七百九十二為法除積得七百三十八兩餘與法皆再折得四十八分兩之二百二十三若求練絲折法置積兩以十六乗以十一除得絲數今有鐵十斤一經入爐得七斤今有鐵三經入爐得七十九斤一十一兩問未入爐本鐵㡬何答曰二百三十二斤五兩四銖三百四十三分銖之二百八十四術曰置鐵三經入爐得斤兩數以十斤再自乗乃乗上為實以七斤再自乗為法實如法而得一草曰置三經入爐得七十九斤以十六乗之内一十一兩得一千二百七十五兩以十斤再自乗得一千以乗之得一百二十七萬五千為實以七斤再自乗七兩得三百四十三為法以除實得三千七百一十七兩餘六十九以二十四乗之得一千六百五十六又以法除之得四銖三百四十三分銖之二百八十四又以十六除所得兩數得二百三十二斤五兩併前銖零合前問今有絲一斤八兩直絹一疋今持絲一斤禆錢五十得絹三丈今有錢一千問得絹㡬何答曰一疋二丈六尺六寸大半寸術曰置絲一斤兩數以一疋尺數乗之以絲一斤八兩數而一所得以減得絹尺數餘以一千錢乗之為實以五千錢為法實如法得一草曰置絲一十六兩以四十尺乗之得六百四十以一斤八兩通為二十四兩為法除之得二丈六尺六寸大半寸為絲所得之絹以減三丈餘三尺三寸少半寸為錢之所直以三尺三寸三因之内子一得十尺以乗一千錢得一萬尺又以禆錢五十以三因之得一百五十為法除實得六丈六尺六寸大半寸合前問今有甲貸乙絹三疋約限至不還疋日息三尺今過限七日取絹二疋償錢三百問一疋直錢㡬何答曰七百五錢十七分錢之十五術曰以過限日息尺數減取絹疋尺數餘為法以償錢乗一疋尺數為實實如法而一草曰置七日三疋絹日息三尺共九尺以乗七日得六十三尺以減八十尺餘一十七尺為法又置償錢三百以四十尺乗之得一萬二千錢以一十七為法除之得七百五文餘十七分錢之十五合前問今有金方七銀方九秤之適相當交易其一金輕七兩問金銀各重㡬何答曰金方重十五兩十八銖銀方重十二兩六銖術曰金銀方數相乗各以半輕數乗之為實以超方數乗金銀方數各自為法實如法而一草曰置金方七銀方九相乗得六十三以半輕數三兩半乗得二百二十兩半又以金銀超方數二以乗金方數得一十四為法除實得一十五兩餘不盡者以二十四乗之得二百五十二銖再以前法除之得一十八銖若求銀方又置前二百二十兩半以銀方九二因得一十八為法除之得一十二兩餘二十四乗之得一百八以法除之得六銖為銀方合前問今有器容九㪷中有米不知其數滿中粟舂之得米五㪷八升問滿粟㡬何答曰八㪷術曰置器容九㪷以米數減之餘以五之二而一得滿粟斗數草曰置九㪷以米五㪷八升減之得三㪷二升以粟數五因之得一石六㪷以糠率二㪷除之得八㪷為粟合前問今有七百人造浮橋九日成今增五百人問日㡬何答曰五日四分日之一術曰置本人數以日數乗之為實以本人數今増人數併之為法實如法而一草曰置七百人以九百因之得六千三百又以増五百人加七百人得一千二百人為法除之得五日餘四分日之一合前問今有與人錢初一人與三錢次一人與四錢次一人與五錢以次與之轉多一錢與訖還歛聚與均分之人得一百錢問人㡬何答曰一百九十五人術曰置人得錢數以減初人錢數餘倍之以轉多錢數加之得人數草曰置人得錢一百減初人錢三文得九十七倍之加初人得一百九十五合前問張邱建算經卷上
