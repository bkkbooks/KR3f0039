body:
  text: 張邱建算經卷中周甄鸞注經唐李淳風注釋劉孝孫撰細草今有戸出銀一斤八兩一十二銖今以家有貧富不等令戸别作差品通融出之最下戸出銀八兩以次戸差各多三兩問戸㡬何答曰一十二戸術曰置一戸出銀斤兩銖數以最下戸出銀兩銖數減之餘倍之以差多兩銖數加之為實以差兩銖數為法實如法而一草曰置二十四兩以二十四乗之内一十二銖得五百八十八銖減最下戸八兩數一百九十二銖餘三百九十六倍之得七百九十二又加差多三兩數七十二銖共得八百六十四為實以差多兩數七十二為法除實得一十二戸合前問今有人盗馬乗去已行三十七里馬主乃覺追之一百四十五里不及二十三里而還今不還追之問㡬何里及之答曰二百三十八里一十四分里之三術曰置不及里數以馬主追里數乗之為實以不及里數減已行里數餘為法實如法而一草曰置馬不及里數二十三里以馬主追去一百四十五里乗之得三千三百三十五為實以不及二十三里減已行三十七里餘一十四為法除實得二百三十八里一十四分里之三合前問今有馬行轉遲次日減半疾七日行七百里問日行㡬何答曰初日行三百五十二里一百二十七分里之九十六次日行一百七十六里一百二十七分里之四十八次日行八十八里一百二十七分里之二十四次日行四十四里一百二十七分里之一十二次日行二十二里一百二十七分里之六次日行一十一里一百二十七分里之三次日行五里一百二十七分里之六十五術曰置六十四三十二一十六八四二一為差副併為法以行里數乗未併者各自為實實如法而一草曰置七日為七位以次倍之得一二四八十六三十二六十四為差以副併之得一百二十七為法以七日行七百里乗未併者初日得四百四十八里次得二百二十四里次得一百一十二里次得五十六里次得二十八里次得十四里次得七里各自為實實如法而一各合問今有駑馬日初發家良馬日以七分之一發家日乃五分之二行四十五里及駑馬問良駑馬一日不止各行㡬何答曰良馬日行一百七十五里駑馬日行一百一十二里一百五十步術曰置五分之二七分之一相減餘為良馬行率増七分日之一為駑馬行率各以為法以及里數乗二母為實實如法而一草曰置七分於右上一於左上五分於右下二於左下以右上乗左下得十四以右下乗左上得五減十四得九為良馬率法以五加九得十四為駑馬率法以七分五分相乗得三十五以乗追及四十五里得一千五百七十五里為實以良馬九法除之得一百七十五里為良馬行又以十四除實得一百一十二里餘七里以里法三百通之得二千一百步再以十四除之得一百五十步合前問今有遲行者五十步疾行者七十歩遲行者以先發疾行者以後發行八十七里一百五十步乃及之問遲行者先發行㡬何里答曰二十五里術曰以遲行步數減疾行步數餘以乗及步數為實以疾行步數為法實如法而一草曰置疾行七十步以遲行五十步減之餘二十步以乗及八十七里半得一千七百五十里以疾行七十步為法除實得二十五里合前問今有甲日行七十里乙日行九十里甲日以五分之一乃發乙日以三分之二乃發問乙行㡬何里及甲答曰一百四十七里術曰以五分日之一減三分日之二餘以甲日行里數乗之又以乙日行里數乗之為實以甲乙行里數相減餘以乗二分母為法實如法而一草曰置五分於右上置之一於左上又置三分於右下之二於左下以右上五乗左下二得一十以右下三乗左上一得三以減十餘七以甲行七十里乗之得四百九十又以乙行九十里乗之得四萬四千一百以甲行里數減乙行里數餘二十里以二分母乗之得三百以除實得一百四十七里乃合前問今有築城上廣一丈下廣三丈髙四丈今已築髙一丈五尺問已築上廣㡬何答曰二丈二尺五寸術曰置城下廣以上廣減之又置城髙以減築髙餘相乗以城髙而一所得加城上廣即得草曰置城下廣三十尺以上廣減之餘二十尺别以城髙四十尺以築髙一丈五尺減之得二丈五尺以乗二十尺得五百尺以城髙四十尺為法除之得一丈二尺五寸所得加城上廣一丈得二丈二尺五寸合前問今有築牆上廣二尺下廣六尺髙二丈今已築上廣三尺六寸問已築髙㡬何答曰一丈二尺術曰置已築上廣及下廣各減牆上廣以築上廣減餘以減下廣減餘餘乗牆髙為實以牆上廣減下廣餘為法實如法而一草曰置牆下廣六尺以築髙上廣三尺六寸減之餘二尺四寸以牆髙二十尺乗之得四十八尺又以牆上廣二尺減下廣六尺餘四尺為法除之得一丈二尺合前問今有方錐下方二丈髙三丈欲斬末為方亭令上方六尺問斬髙㡬何答曰九尺術曰令上方尺數乗髙尺數為實以下方尺數為法實如法而一臣淳風等謹按此術下方為勾率髙為股率上方為今有見勾數以見勾乗股率如勾率而一即得草曰置上方六尺以乗髙三十尺得一百八十尺以下方二十尺為法實如法得九尺合前問今有方亭下方三丈上方一丈髙二丈五尺欲接築為方錐問接築髙㡬何答曰一丈二尺五寸術曰置上方尺數以髙乗之為實以上方尺數減下方尺數餘為法實如法而一草曰置上方十尺以髙二十五尺乗之得二百五十尺以上方一丈減下方三丈餘二丈為法除實得一丈二尺五寸乃合前問今有堢壔方四丈髙二丈欲以塼四靣單壘之塼一枚廣五寸長一尺一寸厚二寸問用磚㡬何答曰一萬四千七百二十七磚一十一分磚之三術曰置堢壔方丈寸數以塼廣增之而以四乗之以髙乗之為實以塼長厚相乗為法實如法而一草曰置四百寸加五寸以四因之得一千六百二十寸又以髙二百寸乗之得三十二萬四千寸以塼長厚相乗得二十二寸為法除之得一萬四千七百二十七枚一十一分塼之三合前問今有築圓堢壔周九丈六尺髙一丈三尺問用壤土㡬何答曰一萬六千六百四十尺術曰周自相乗以髙乗之又以五乗為實以三乗十二為法實如法而一草曰以周九丈六尺自相乗得九千二百一十六尺又以髙一丈三尺乗之得一十一萬九千八百八又以五乗之得五十九萬九千四十為實以三乗十二得三十六為法除實得一萬六千六百四十尺合前問今有率戸出絹三疋依貧富欲以九等出之令戸各差除二丈今有上上三十九戸上中二十四戸上下五十七戸中上三十一戸中中七十八戸中下四十三戸下上二十五戸下中七十六戸下下一十三戸問九等戸各應出絹㡬何答曰上上戸戸出絹五疋上中戸戸出絹四疋二大上下戸戸出絹四疋中上戸戸出絹三疋二丈中中戸戸出絹三疋中下戸戸出絹二疋二丈下上戸戸出絹二疋下中戸戸出絹一疋二丈下下戸戸出絹一疋術曰置上八等戸各求積差上上戸十六上中戸十四上下戸十二中上戸十中中戸八中下戸六下上戸四下中戸二各以其戸數乗而併之以出絹疋丈數乗凡戸所得以併數減之餘以凡戸數而一所得即下下戸遞加差各得上八等戸所出絹疋丈數草曰置上上戸三十九以十六乗之得六百二十四列於上又置上中戶二十四以十四因之得三百三十六併上又置上下戸五十七以十二因之得六百八十四併上位又置中上戸三十一以十因之得三百一十併上位又置中中戸七十八以八因之得六百二十四併上位又置中下戸四十三以六因之得二百五十八併上位又置下上戸二十五以四因之得一百併上位又置下中戸七十六以二因之得一百五十二併上位都得三千八十八又併九等戸三百八十六以十二丈因之得四千六百三十二丈以減三千八十八丈餘一千五百四十四丈以為平率以衆戸數三百八十六而一除之得四丈為一疋是最下之戸所出絹以次各加二丈至上上戸出五疋皆合前問今有粟米三千斛六百人食之其一百人日食糳米八斛二百人日食粺米十四斛三百人日食糲米十八斛問粟得㡬何日食之答曰四十一日四十九分日之一十六術曰置粟數為實以三等日食米積數各求為粟之數併以為法實如法而一草曰置糳米八斛以五十乗之以糳米二十四除得一十六斛餘一十六以二十四八約之得三餘得二又置粺米十四斛以五十乗之得七十斛以粺米率二十七除得二十五斛餘二十七分之二十五又置糲米十八斛以五十乗之三十除之得三十斛併三位得七十一斛又置餘分三於右上二於左上二十七於右下二十五於左下以右上三乗左下二十五得七十五以右下二十七乗左上二得五十四併之得一百二十九又以分母三乗二十七得八十一為法除得一斛加上位七十一得七十二餘四十八分母八十一各三約之得二十七分之一十六又以二十七分乗七十二斛内子一十六得一千九百六十為法乃置粟三千斛以母二十七乗之得八萬一千為實以一千九百六十為法除得四十一日法與餘俱再折得四十九分日之十六合前問今有三女各刺文一方長女七日刺訖中女八日半刺訖小女九日太半刺訖今令三女共刺一方問㡬何日刺訖答曰二日一千二百五十六分日之九百三十九術曰置日數以㸦乘方數併為法日數相乘為實實如法而一草曰置大女七日於右上一於左上中女八日半是二分之一以分母通分内子一得十七於右中一於左中小女九日太半以分母三因之内子二得二十九於右下一於左下乃㸦乗之以右中十七乗左上一得十七又以右下二十九乗之得四百九十三又以右上七乗左中一得七又以右下二十九乗之又以分母二因之得四百六又以右上七乗左下一又以右中十七乗之又以分母三因之得三百五十七併之得一千二百五十六為法又以右上七乗中一十七得一百一十九又以右下二十九乗之得三千四百五十一為實以法除之得二日一千二百五十六分日之九百三十九合前問今有車運麥輸太倉去三十七里十六分里之十一重車日行四十五里七日五返問空車日行㡬何答曰日行六十七里術曰置麥去太倉里數以返數乗之以重車日行里數而一所得為重行日數以減凡日數餘為空行日數以為法以返數乗麥去太倉里數為實實如法而一草曰置去太倉里數三十七里以十六乗之内子一十一得六百三里又以返數五乗之得三千一十五以重車日行四十五以分母十六乗之得七百二十為法除三千一十五得四日不盡二因九約約得十六分日之三為重車日行里又置七日以十六乗之得一百一十二又置四日以十六乗之内子三得六十七以減一百一十二餘四十五為法以除去太倉里數三千一十五得六十七里合前問今有人持錢之洛賈利五之初返歸一萬六千第二返歸一萬七千第三返歸一萬八千第四返歸一萬九千第五返歸二萬凡五返歸本利俱盡問本錢㡬何答曰三萬五千三百二十六錢一萬六千八百七分錢之五千九百一十八術曰置後返歸錢數以五乗之以七乗第四返歸錢數加之以五乗之以四十九乗第三返歸錢數加之以五乗之以三百四十三乗第二返歸錢數加之以五乗之以二千四百一乗初返歸錢數加之以五乗之以一萬六千八百七而一得本錢數一法盈不足術為之亦得草曰置最後返錢數以五乗之得十萬又以第四返錢一萬九千以七乗之得一十三萬三千併上位得二十三萬三千又以五因之得一百一十六萬五千又置第三返一萬八千以四十九乗之得八十八萬二千又加上位得二百四萬七千又以五乗之得一千二十三萬五千又置第二返一萬七千以三百四十三乗之得五百八十三萬一千加上位得一千六百六萬六千又以五乗之得八千三十三萬又置初返日一萬六千以二千四百一乗之得三千八百四十一萬六千加上位得一億一千八百七十四萬六千又以五乗之得五億九千三百七十三萬為實又以一萬六千八百七為法除實得三萬五千三百二十六文一萬六千八百七分錢之五千九百一十八今有清酒一㪷直粟十㪷醑酒一㪷直粟三㪷今持粟三斛得酒五㪷問清醑酒各㡬何答曰醑酒二㪷八升七分升之四清酒二㪷一升七分升之三術曰置得酒㪷數以清酒直數乗之減去持粟㪷數餘為醑酒實又置得酒㪷數以醑酒直數乗之以減持粟㪷數餘為清酒實各以二直相減餘為法實如法而一即得以盈不足為之亦得草曰置得五㪷以清酒十量乗之得五斛減持去粟三斛餘二斛為醑酒實又置酒五㪷以醑酒三量乗之得一斛五㪷以減三斛餘一斛五㪷為清酒實以三減十餘七為法除醑酒實得二㪷八升七分升之四又以法除清酒實得二㪷一升七分升之三合前問今有田積一十二萬七千四百四十九步問為方㡬何答曰三百五十七步術曰以開方除之即得草曰置前積步數於上借一算子於下常超一位步至百止以上商置三百於積步之上又置三萬於積步之下下法之上名曰方法以方命上商三三如九除九萬又倍方法一退下法再退又置五十於上商之下又置五百於下法之上名曰隅法以方隅二法除實餘有四千九百四十九又倍隅法以併方得七千退一等下法再退又置七於上商五十之下又置七於下法之上名曰隅法以方隅二法除實得合前問今有田方一百二十一步欲以為圓問周幾何答曰四百一十九步八百二十九分步之一百三十一術曰方自相乗又以十二乗之為實開方除之即得草曰以一百二十一步自相乗得一萬四千六百四十一又以十二乗之得一十七萬五千六百九十二借一算子於下常超一位步至百止上商得四百下置四萬為方法命上商除一十六萬倍下方法退一位得八千下法退二等又置上商得一十又置下法之上一百名曰隅法以方隅除實八千一百又置倍隅法從方法退一等得八百二十又置九於一十之下又置九於下法之上名隅法以方命上商八九七十二除七千二百又以方法二命上商九除一百八十又以隅法九命上商九除八十一餘一百三十一即四百一十九步八百二十九之一百三十一合前問今有圓田周三百九十六步欲為方問得幾何答曰一百一十四步二百二十九分步之七十二術曰周自相乗十二而一所得開方除之即得方草曰置三百九十六自相乗得一十五萬六千八百一十六以十二而一得一萬三千六十八以開方法除借一算子於下常超一位至百止上商置一百下置一萬於下法之上名曰方法以方法命上商除實一萬退方法倍之下法再退又置一十於上商之下又置一百於下法上名曰隅法以方隅二法皆命上商除實二千一百又隅法倍之以從方法退一位下法再退又置四於上商一十之下又置四於下法之上名曰隅法以方隅二法皆命上商除實八百九十六餘得合前問今有弧田弦六十八步五分步之三為田二畝三十四步四十五分步之三十二問矢幾何答曰矢一十二步三分步之二術曰置田積步倍之為實以弦步數為從案此下原本闕張邱建算經卷中
