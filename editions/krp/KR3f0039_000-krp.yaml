body:
  text: 張邱建算經天文算法類二算書之屬提要臣等謹案張邱建算經三卷原本不題撰人時代今據邱建自序署曰清河而序中引及夏侯陽孫子之術則當為隋初人也隋志載此書二卷唐志一卷甄鸞注而别有李淳風注張邱建算經三卷鄭樵通志藝文畧張邱建算經二卷又三卷李淳風注宋藝文志中興書目俱作三卷此本乃毛晉汲古閣影抄宋槧云得之太倉王氏首題漢中郡守前司𨽻甄鸞注經朝議大夫行太史令上輕車都尉李淳風等奉勅注釋算學博士劉孝孫撰細草盖猶北宋時秘書監趙彦若等校定刋行之本其中稱術曰者乃鸞所注草曰者孝孫所増其細字夾注稱臣淳風等謹案者不過數十處盖有疑則釋非節節為之注也其書體例皆設為問答以㕘校而申明之凡一百條簡奥古質頗類九章與近術不同而條理精宻實能深究古人之意故唐代頒之算學以為顓業今詳加校勘其上卷起自乘除之數至第十二問為勾股測望十三問為勾股和較十四問為重勾股顛倒測望十五問為卧勾股左右進退測望此四問皆籍圖以明舊本所無今特依義補入自十六問以下皆取差分和較均輸㕘雜為目間附以方圓冪積至中卷之六問乃入商功後復及貴賤差分倍半衰方田諸分術惟弧矢一問原本不完未可以他術増補姑仍其缺下卷首問失題又細草下亦脱二十餘字以有後文可據謹為補足其鹿垣倉三條亦各為之圖系諸原問之左俾學者得以考見其端委焉乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀張邱建算經序夫學算者不患乗除之為難而患通分之為難是以序列諸分之本元宣明約通之要法上實有餘為分子下法從而為分母可約者約以命之不可約者因以名之凡約法髙者下之耦者半之竒者商之副置其子及其母以少減多求等數而用之乃若其通分之法先以其母乗其全然後内子母不同者母乗子母亦相乗為一母諸子共之約之通分而母入者出之則定其夏侯陽之方倉孫子之蕩杯此等之術皆未得其妙故更造新術推盡其理附之於此余為後生好學有無由以至者故舉其大㮣而為之法不復煩重庶其易曉云耳清河張邱建謹序張邱建算經原序
