  - {type: variant, offset: 526, length: 0, content: '', WYG: 張邱建算經序夫學算者不患乗除之為難而患通分之為難是以序列諸分之本元宣明約通之要法上實有餘為分子下法從而為分母可約者約以命之不可約者因以名之凡約法髙者下之耦者半之竒者商之副置其子及其母以少減多求等數而用之乃若其通分之法先以其母乗其全然後内子母不同者母乗子母亦相乗為一母諸子共之約之通分而母入者出之則定其夏侯陽之方倉孫子之蕩杯此等之術皆未得其妙故更造新術推盡其理附之於此余為後生好學有無由以至者故舉其大㮣而為之法不復煩重庶其易曉云耳清河張邱建謹序張邱建算經原序}
  - {type: variant, offset: 526, length: 0, content: '', krp: 張邱建算經序夫學算者不患乗除之為難而患通分之為難是以序列諸分之本元宣明約通之要法上實有餘為分子下法從而為分母可約者約以命之不可約者因以名之凡約法髙者下之耦者半之竒者商之副置其子及其母以少減多求等數而用之乃若其通分之法先以其母乗其全然後内子母不同者母乗子母亦相乗為一母諸子共之約之通分而母入者出之則定其夏侯陽之方倉孫子之蕩杯此等之術皆未得其妙故更造新術推盡其理附之於此余為後生好學有無由以至者故舉其大㮣而為之法不復煩重庶其易曉云耳清河張邱建謹序張邱建算經原序}
